<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0c0c0c;
      color: #f2f2f0;
      padding: 40pt 56pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- 상단 -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <p style="font-size: 9pt; font-weight: 600; color: #FF5C3A; letter-spacing: 0.12em; text-transform: uppercase;">Problem</p>
    <p style="font-size: 9pt; color: #333;">cosmos makers</p>
  </div>

  <!-- 메인 레이아웃 -->
  <div style="flex: 1; display: flex; gap: 40pt; align-items: center; padding: 16pt 0;">

    <!-- 왼쪽: 헤드라인 + 인용 -->
    <div style="flex: 1.1; display: flex; flex-direction: column; gap: 20pt;">
      <h2 style="font-size: 28pt; font-weight: 700; color: #f2f2f0; letter-spacing: -0.02em; line-height: 1.15;">키오스크는 늘었고,<br>사람은 포기했다</h2>

      <div style="border-left: 2.5px solid #FF5C3A; padding-left: 14pt;">
        <p style="font-size: 12pt; font-weight: 500; color: #f2f2f0; line-height: 1.5; font-style: italic;">"나이 먹으면<br>죽으라는 거야?"</p>
        <p style="font-size: 8pt; color: #555; margin-top: 6pt;">— 키오스크 앞에서, 2023</p>
      </div>
    </div>

    <!-- 오른쪽: 통계 3개 -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 8pt;">

      <div style="border-top: 1px solid #1e1e1e; padding-top: 8pt;">
        <p style="font-size: 28pt; font-weight: 700; color: #FF5C3A; letter-spacing: -0.02em; line-height: 1.2;">4 / 5</p>
        <p style="font-size: 9pt; color: #888; margin-top: 5pt; line-height: 1.4;">65세 이상, 키오스크 있는 식당<br>방문을 <span style="color: #f2f2f0; font-weight: 600;">포기</span></p>
      </div>

      <div style="border-top: 1px solid #1e1e1e; padding-top: 8pt;">
        <p style="font-size: 28pt; font-weight: 700; color: #FF5C3A; letter-spacing: -0.02em; line-height: 1.2;">76.6%</p>
        <p style="font-size: 9pt; color: #888; margin-top: 5pt; line-height: 1.4;">75세 이상, 키오스크 이용 시<br><span style="color: #f2f2f0; font-weight: 600;">불편함</span> 경험</p>
      </div>

      <div style="border-top: 1px solid #1e1e1e; padding-top: 8pt;">
        <p style="font-size: 28pt; font-weight: 700; color: #f2f2f0; letter-spacing: -0.02em; line-height: 1.2;">53만 대</p>
        <p style="font-size: 9pt; color: #888; margin-top: 5pt; line-height: 1.4;">국내 키오스크 수 (2023)<br>2년 새 <span style="color: #f2f2f0; font-weight: 600;">2.5배</span> 증가</p>
      </div>

    </div>
  </div>

  <!-- 하단 -->
  <div>
    <p style="font-size: 8pt; color: #333;">출처: 전자신문 2023 · 한국경제 2023 · 한국소비자원</p>
  </div>
</body>
</html>
