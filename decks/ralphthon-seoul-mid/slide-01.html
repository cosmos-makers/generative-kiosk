<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0c0c0c;
      color: #f2f2f0;
      padding: 40pt 56pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- 상단 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <p style="font-size: 9pt; font-weight: 500; color: #555; letter-spacing: 0.12em; text-transform: uppercase;">Ralphthon Seoul 2026</p>
    <p style="font-size: 9pt; font-weight: 500; color: #555; letter-spacing: 0.08em;">cosmos makers</p>
  </div>

  <!-- 메인 -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20pt; overflow: visible;">
    <div>
      <p style="font-size: 9pt; font-weight: 600; color: #00C9A0; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 14pt;">Generative Kiosk</p>
      <h1 style="font-size: 40pt; font-weight: 700; color: #f2f2f0; letter-spacing: -0.03em; line-height: 1.2; overflow: visible;">키오스크가<br>사람에게<br>맞춰야 한다</h1>
    </div>
  </div>

  <!-- 하단 팀 정보 -->
  <div style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div style="display: flex; gap: 24pt;">
      <div>
        <p style="font-size: 8pt; color: #444; margin-bottom: 5pt; letter-spacing: 0.08em; text-transform: uppercase;">Team</p>
        <p style="font-size: 10pt; font-weight: 600; color: #f2f2f0;">오제관 · 김은란 · 신태림</p>
      </div>
      <div>
        <p style="font-size: 8pt; color: #444; margin-bottom: 5pt; letter-spacing: 0.08em; text-transform: uppercase;">GitHub</p>
        <p style="font-size: 10pt; font-weight: 500; color: #555;">cosmos-makers/generative-kiosk</p>
      </div>
    </div>
    <div style="width: 36pt; height: 36pt; border: 1.5px solid #2a2a2a; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
      <p style="font-size: 14pt; color: #333;">↘</p>
    </div>
  </div>
</body>
</html>
