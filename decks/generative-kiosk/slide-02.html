<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0c0c0c;
      padding: 36pt 52pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #4AE3B5; color: #0c0c0c; border-radius: 3pt; font-size: 8pt; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;">배경</p>
      <h2 style="font-size: 22pt; font-weight: 600; color: #ffffff;">Generative UI 란?</h2>
    </div>
    <p style="font-size: 10pt; color: #333;">02</p>
  </div>

  <!-- 콘텐츠: SWE 2.0 vs 3.0 -->
  <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20pt;">
    <!-- SWE 2.0 -->
    <div style="background: #141414; border: 1px solid #2a2a2a; border-radius: 8pt; padding: 24pt;">
      <p style="font-size: 9pt; font-weight: 700; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12pt;">SWE 2.0</p>
      <h3 style="font-size: 18pt; font-weight: 600; color: #888; margin-bottom: 12pt; text-decoration: line-through; text-decoration-color: #333;">한 번 만들고 배포</h3>
      <p style="font-size: 12pt; color: #555; line-height: 1.7;">변하지 않는 소프트웨어.<br>같은 UI, 모든 사람에게.</p>
    </div>

    <!-- SWE 3.0 -->
    <div style="background: #141414; border: 1px solid #4AE3B5; border-radius: 8pt; padding: 24pt;">
      <p style="font-size: 9pt; font-weight: 700; color: #4AE3B5; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12pt;">SWE 3.0</p>
      <h3 style="font-size: 18pt; font-weight: 600; color: #ffffff; margin-bottom: 12pt;">맥락이 UI를 만든다</h3>
      <p style="font-size: 12pt; color: #888; line-height: 1.7;">토큰만 정의하면<br>LLM이 맥락에 맞게 UI를 생성.</p>
    </div>
  </div>

  <!-- 예시 바 -->
  <div style="margin-top: 20pt; background: #141414; border-radius: 6pt; padding: 14pt 20pt; display: flex; align-items: center; gap: 12pt; border: 1px solid #222;">
    <p style="font-size: 9pt; color: #4AE3B5; font-weight: 600; letter-spacing: 0.05em; white-space: nowrap;">예시</p>
    <p style="font-size: 11pt; color: #666; flex: 1;">"미용실 예약하고 싶어"</p>
    <p style="font-size: 16pt; color: #333;">≠</p>
    <p style="font-size: 11pt; color: #aaa; flex: 1; text-align: right;">"NAVER D2SF 강남으로 안내"</p>
    <p style="font-size: 9pt; color: #555; white-space: nowrap;">→ 같은 앱, 다른 UI</p>
  </div>
</body>
</html>
