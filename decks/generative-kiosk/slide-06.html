<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0c0c0c;
      padding: 36pt 52pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; border-radius: 3pt; font-size: 8pt; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;">랄프 역량</p>
      <h2 style="font-size: 20pt; font-weight: 600; color: #ffffff;">AI &amp; 기술 스택</h2>
    </div>
    <p style="font-size: 10pt; color: #333;">06</p>
  </div>

  <!-- 3개 축 -->
  <div style="flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 18pt; margin-bottom: 20pt;">
    <!-- Vision -->
    <div style="background: #141414; border-radius: 8pt; padding: 22pt 18pt; display: flex; flex-direction: column; gap: 10pt; border: 1px solid #2a2a2a;">
      <p style="font-size: 24pt;">👁</p>
      <div>
        <p style="font-size: 10pt; font-weight: 700; color: #4AE3B5; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6pt;">Visual Recognition</p>
        <p style="font-size: 12pt; color: #888; line-height: 1.6;">표정·행동 분석 모델로 사용자의 곤란함을 실시간 감지</p>
      </div>
    </div>

    <!-- GenUI -->
    <div style="background: #0f2a22; border-radius: 8pt; padding: 22pt 18pt; display: flex; flex-direction: column; gap: 10pt; border: 1px solid #4AE3B5;">
      <p style="font-size: 24pt;">⚡</p>
      <div>
        <p style="font-size: 10pt; font-weight: 700; color: #4AE3B5; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6pt;">Generative UI</p>
        <p style="font-size: 12pt; color: #aaa; line-height: 1.6;">LLM이 맥락에 맞게 UI를 실시간으로 단순·크게 재구성</p>
      </div>
    </div>

    <!-- Voice -->
    <div style="background: #141414; border-radius: 8pt; padding: 22pt 18pt; display: flex; flex-direction: column; gap: 10pt; border: 1px solid #2a2a2a;">
      <p style="font-size: 24pt;">🎙</p>
      <div>
        <p style="font-size: 10pt; font-weight: 700; color: #4AE3B5; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6pt;">Voice Mode</p>
        <p style="font-size: 12pt; color: #888; line-height: 1.6;">음성 입출력으로 시각장애인의 완전한 키오스크 접근 가능</p>
      </div>
    </div>
  </div>

  <!-- 지속 전략 바 -->
  <div style="padding: 12pt 18pt; background: #141414; border-radius: 6pt; display: flex; align-items: center; gap: 14pt; border: 1px solid #222;">
    <p style="font-size: 9pt; color: #4AE3B5; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap;">지속 전략</p>
    <p style="font-size: 11pt; color: #666;">Google Analytics 연동 → 사용 데이터 → 자기 개선 에이전트</p>
    <p style="font-size: 11pt; color: #2a9972; font-weight: 500; margin-left: auto; white-space: nowrap;">Un-Harness Engineering →</p>
  </div>
</body>
</html>
