<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0c0c0c;
      padding: 36pt 52pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <p style="font-size: 10pt; font-weight: 500; color: #4AE3B5; letter-spacing: 0.12em; text-transform: uppercase;">Ralphthon Seoul 2025</p>
    <p style="font-size: 10pt; color: #444; letter-spacing: 0.06em;">Mid-Presentation</p>
  </div>

  <!-- 메인 타이틀 -->
  <div>
    <h1 style="font-size: 58pt; font-weight: 700; color: #ffffff; letter-spacing: -0.03em; line-height: 1.25; display: block;">Generative</h1>
    <h1 style="font-size: 58pt; font-weight: 700; color: #ffffff; letter-spacing: -0.03em; line-height: 1.25; display: block;">Kiosk</h1>
    <p style="font-size: 14pt; color: #666; margin-top: 18pt; font-weight: 400; letter-spacing: 0.01em;">
      사용자에 맞게 스스로 모습을 바꾸는 키오스크
    </p>
  </div>

  <!-- 푸터 -->
  <div style="display: flex; justify-content: space-between; align-items: flex-end;">
    <div>
      <p style="font-size: 9pt; color: #444; margin-bottom: 4pt; letter-spacing: 0.05em; text-transform: uppercase;">Team</p>
      <p style="font-size: 12pt; font-weight: 500; color: #888;">cosmos-makers &nbsp;·&nbsp; 오제관(리더) · 김은란 · 신태림</p>
    </div>
    <div style="width: 36pt; height: 36pt; border: 1.5px solid #2a2a2a; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
      <p style="font-size: 14pt; color: #4AE3B5;">→</p>
    </div>
  </div>
</body>
</html>
