<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0c0c0c;
      padding: 36pt 52pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <p style="font-size: 10pt; font-weight: 500; color: #4AE3B5; letter-spacing: 0.12em; text-transform: uppercase;">Ralphthon Seoul 2025</p>
    <p style="font-size: 10pt; color: #333;">07</p>
  </div>

  <!-- 메인 -->
  <div>
    <p style="font-size: 11pt; color: #444; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16pt; font-weight: 600;">우리의 목표</p>
    <h1 style="font-size: 48pt; font-weight: 700; color: #ffffff; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 28pt;">
      Generative UI의<br>가능성을 증명했다면<br><span style="color: #4AE3B5;">성공입니다.</span>
    </h1>
    <p style="font-size: 14pt; color: #555; line-height: 1.7;">
      레슨런을 얻고, 네트워킹하는 것 자체가 목표였으니<br>충분히 만족합니다.
    </p>
  </div>

  <!-- 푸터 -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <p style="font-size: 18pt; color: #333; font-weight: 500; letter-spacing: 0.02em;">잘 놀다갑니다 👋</p>
    <p style="font-size: 11pt; color: #2a2a2a; letter-spacing: 0.04em;">Generative Kiosk</p>
  </div>
</body>
</html>
