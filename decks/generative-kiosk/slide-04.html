<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0c0c0c;
      padding: 36pt 52pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; border-radius: 3pt; font-size: 8pt; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;">솔루션</p>
      <h2 style="font-size: 20pt; font-weight: 600; color: #ffffff;">배리어-프리 Generative UI 키오스크</h2>
    </div>
    <p style="font-size: 10pt; color: #333;">04</p>
  </div>

  <!-- 메인 정의 문장 -->
  <div style="text-align: center; padding: 0 24pt;">
    <p style="font-size: 9pt; color: #4AE3B5; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14pt; font-weight: 600;">한 문장 정의</p>
    <h3 style="font-size: 26pt; font-weight: 600; color: #ffffff; line-height: 1.35; letter-spacing: -0.02em;">
      "사용자가 곤란해지는 순간,<br>UI가 스스로 바뀌는 키오스크"
    </h3>
  </div>

  <!-- 포인트 3개 -->
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16pt;">
    <div style="padding: 16pt; border-top: 1.5px solid #2a2a2a;">
      <p style="font-size: 9pt; color: #4AE3B5; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8pt;">대상</p>
      <p style="font-size: 12pt; color: #aaa; line-height: 1.6;">노년층, 시각장애인,<br>디지털 인터페이스<br>미숙 사용자</p>
    </div>
    <div style="padding: 16pt; border-top: 1.5px solid #2a2a2a;">
      <p style="font-size: 9pt; color: #4AE3B5; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8pt;">왜 키오스크인가</p>
      <p style="font-size: 12pt; color: #aaa; line-height: 1.6;">살아있는 문제.<br>여기서 GenUI가 동작하면<br>어디서든 동작한다.</p>
    </div>
    <div style="padding: 16pt; border-top: 1.5px solid #2a2a2a;">
      <p style="font-size: 9pt; color: #4AE3B5; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8pt;">포지셔닝</p>
      <p style="font-size: 12pt; color: #aaa; line-height: 1.6;">GenUI의 가장 뾰족한<br>테스트베드 MVP.</p>
    </div>
  </div>
</body>
</html>
